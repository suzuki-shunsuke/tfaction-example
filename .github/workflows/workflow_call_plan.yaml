---
name: plan
on:
  workflow_call:
    inputs:
      targets:
        required: true
        type: string
    secrets:
      APP_PRIVATE_KEY:
        required: true

jobs:
  plan:
    timeout-minutes: 30
    name: "plan (${{matrix.target.target}})"
    runs-on: ${{matrix.target.runs_on}}
    permissions:
      id-token: write # For OIDC
      contents: read # To checkout private repositories
    env:
      TFACTION_TARGET: ${{matrix.target.target}}
      TFACTION_WORKING_DIR: ${{matrix.target.working_directory}}
      TFACTION_JOB_TYPE: ${{matrix.target.job_type}}
      TFACTION_SKIP_TERRAFORM: "${{matrix.target.skip_terraform}}"
    strategy:
      fail-fast: true
      matrix:
        target: ${{fromJSON(inputs.targets)}}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.59.0

      - name: Generate token
        id: token
        if: failure()
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write # Push commits
          permission-pull-requests: write # Create PR comments and labels

      - name: Set up
        uses: suzuki-shunsuke/tfaction@f24a40308c268d6597a72eab8da2edf9cc87da1d # v2.0.0-8
        with:
          action: setup
          github_token: ${{steps.token.outputs.token}}

      - name: terraform init
        uses: suzuki-shunsuke/tfaction@f24a40308c268d6597a72eab8da2edf9cc87da1d # v2.0.0-8
        with:
          action: terraform-init
          github_token: ${{steps.token.outputs.token}}

      - name: Test
        uses: suzuki-shunsuke/tfaction@f24a40308c268d6597a72eab8da2edf9cc87da1d # v2.0.0-8
        with:
          action: test
          github_token: ${{steps.token.outputs.token}}

      - name: Plan
        uses: suzuki-shunsuke/tfaction@f24a40308c268d6597a72eab8da2edf9cc87da1d # v2.0.0-8
        with:
          action: plan
          github_token: ${{steps.token.outputs.token}}
        env:
          TF_CLI_ARGS_plan: "-parallelism=30" # https://suzuki-shunsuke.github.io/tfaction/docs/unreleased/terraform-options
