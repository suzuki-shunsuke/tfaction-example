---
name: List Changed Modules
on:
  workflow_call:
    inputs:
      is_apply:
        type: boolean
        default: false
    secrets:
      APP_PRIVATE_KEY:
        required: true
    outputs:
      targets:
        description: targets
        value: ${{jobs.list.outputs.targets}}
      modules:
        description: targets
        value: ${{jobs.list.outputs.modules}}
jobs:
  list:
    timeout-minutes: 15
    permissions:
      contents: read # For checkout a private repository
      pull-requests: write # Delete comments and get PR changed files
    runs-on: ubuntu-slim
    env:
      TFACTION_IS_APPLY: ${{inputs.is_apply}}
    outputs:
      targets: ${{steps.list-targets.outputs.targets}}
      modules: ${{steps.list-targets.outputs.modules}}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Delete old comments
        # https://suzuki-shunsuke.github.io/tfaction/docs/unreleased/hide-or-delete-old-comment
        uses: suzuki-shunsuke/tfaction@0627b0a1dfec9479a3fa73a5831be7979661b7eb # v2.0.4
        with:
          action: delete-comment

      - name: List Changed Modules
        uses: suzuki-shunsuke/tfaction@0627b0a1dfec9479a3fa73a5831be7979661b7eb # v2.0.4
        id: list-targets
        with:
          action: list-targets
